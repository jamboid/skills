<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — {{PROJECT}}</title>
<style>
:root {
  --c-bg:            #fafaf9;
  --c-surface:       #ffffff;
  --c-surface-alt:   #f4f4f2;
  --c-text:          #1a1a18;
  --c-text-muted:    #5a5a55;
  --c-text-faint:    #8a8a82;
  --c-border:        #e5e4e0;
  --c-border-strong: #d4d2cc;
  --c-accent:        #3a5cff;
  --c-accent-soft:   #eaf0ff;
  --radius:          8px;
  --radius-lg:       12px;
  --shadow-sm:       0 1px 2px rgba(20,20,18,.04);
  --shadow-md:       0 4px 14px rgba(20,20,18,.06);
  --content-max:     820px;
  --font-sans:       system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono:       'SF Mono', 'Fira Code', Consolas, 'Courier New', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { font-family: var(--font-sans); background: var(--c-bg); color: var(--c-text); line-height: 1.65; }

.page { max-width: var(--content-max); margin: 0 auto; padding: 64px 32px 80px; }

.eyebrow {
  display: inline-block;
  font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--c-accent); background: var(--c-accent-soft);
  padding: 4px 11px; border-radius: 9999px; margin-bottom: 14px;
}
h1 { font-size: 38px; font-weight: 700; line-height: 1.15; letter-spacing: -0.015em; margin-bottom: 12px; }
.lede { font-size: 19px; color: var(--c-text-muted); max-width: 62ch; line-height: 1.6; margin-bottom: 40px; }

/* ── Link list — one entry per page ── */
.links { display: flex; flex-direction: column; gap: 10px; }
.links a {
  display: block;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 18px 22px;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
}
.links a:hover { border-color: var(--c-border-strong); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.links h2 { font-size: 18px; font-weight: 700; margin-bottom: 3px; }
.links p { font-size: 15px; color: var(--c-text-muted); margin: 0; }

footer {
  border-top: 1px solid var(--c-border);
  margin-top: 64px; padding-top: 24px;
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  font-size: 13px; color: var(--c-text-faint);
}
a { color: var(--c-accent); }

@media (max-width: 500px) { .page { padding: 48px 18px 60px; } h1 { font-size: 28px; } }
</style>
</head>
<body>
<div class="page">

  <span class="eyebrow">{{EYEBROW}}</span>
  <h1>{{TITLE}}</h1>
  <p class="lede">{{LEDE}}</p>

  <div class="links">
    <!-- One per detail page:
    <a href="detail-slug.html"><h2>Page title</h2><p>One-line description.</p></a>
    -->
{{LINKS}}
  </div>

  <footer>
    <span>{{PROJECT}}</span>
    <span>{{DATE}}</span>
  </footer>

</div>
</body>
</html>
